<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
<head>                    <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
  <title>목록·시맨틱</title>   <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
  <!-- 시맨틱 태그 = 어느 부분인지 뜻이 담긴 이름표 상자 -->
  <header>맨 위 (로고·제목)</header>       <!-- 페이지 맨 위 구역 -->
  <main>                                  <!-- 핵심 내용 구역 -->
    <!-- ul = 점 찍힌 목록 상자, li = 목록 안의 한 줄 -->
    <ul>
      <li>좋아하는 것: 영화</li>   <!-- 목록 항목 1 -->
      <li>취미: 산책</li>          <!-- 목록 항목 2 -->
      <li>목표: 웹 개발자</li>     <!-- 목록 항목 3 -->
    </ul>
  </main>
  <footer>맨 아래 (저작권·연락처)</footer> <!-- 페이지 맨 아래 구역 -->
</body>
</html>
