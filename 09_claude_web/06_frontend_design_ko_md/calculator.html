<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대한민국 정부 공식 계산기</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root {
    --gray-10: #F4F5F6;
    --gray-20: #E6E8EA;
    --gray-30: #CDD1D5;
    --gray-50: #8A949E;
    --gray-60: #6D7882;
    --gray-80: #464C53;
    --gray-100: #131416;
    --primary-10: #ECF2FE;
    --primary-50: #256EF4;
    --primary-60: #0B50D0;
    --primary-70: #063A74;
    --secondary-10: #EEF2F7;
    --danger: #D6322F;
    --fg-1: var(--gray-100);
    --fg-2: var(--gray-80);
    --fg-3: var(--gray-60);
    --border-default: var(--gray-30);
    --shadow-2: 0 2px 6px rgba(19,20,22,0.08), 0 1px 2px rgba(19,20,22,0.04);
    --shadow-3: 0 6px 16px rgba(19,20,22,0.10), 0 2px 4px rgba(19,20,22,0.05);
    --radius-small: 6px;
    --radius-medium: 8px;
    --radius-xlarge: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* government-identifier-strip */
  .gov-identifier {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--gray-100);
    color: #fff;
    font-size: 13px;
  }

  body {
    font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
      "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    font-size: 17px;
    line-height: 1.55;
    letter-spacing: 0;
    color: var(--fg-1);
    background: var(--secondary-10);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  :focus-visible {
    outline: 2px solid var(--primary-50);
    outline-offset: 2px;
  }

  /* Header */
  header {
    background: #fff;
    border-bottom: 1px solid var(--border-default);
  }
  .header-inner {
    max-width: 1248px;
    margin: 0 auto;
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .brand-mark img { width: 100%; height: 100%; }
  .brand-name {
    font-size: 19px;
    font-weight: 700;
    color: var(--primary-70);
  }
  .brand-slogan {
    font-size: 13px;
    color: var(--fg-3);
    border-left: 1px solid var(--border-default);
    padding-left: 12px;
    margin-left: 4px;
  }

  /* Main */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 64px;
  }
  .calc-wrap { width: 100%; max-width: 400px; }

  .page-title {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .page-desc {
    font-size: 15px;
    color: var(--fg-2);
    margin-bottom: 24px;
  }

  .calculator {
    background: #fff;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-xlarge);
    box-shadow: var(--shadow-2);
    padding: 24px;
  }

  /* Display */
  .display {
    background: var(--gray-10);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-medium);
    padding: 16px 20px;
    margin-bottom: 16px;
    text-align: right;
    overflow: hidden;
  }
  .display .expression {
    font-size: 15px;
    color: var(--fg-3);
    min-height: 23px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .display .result {
    font-size: 36px;
    font-weight: 700;
    line-height: 1.3;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    color: var(--fg-1);
  }
  .display .result.error { color: var(--danger); font-size: 24px; }

  /* Keypad */
  .keypad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .keypad button {
    height: 56px;
    font-family: inherit;
    font-size: 19px;
    font-weight: 700;
    border-radius: var(--radius-medium);
    border: 1px solid var(--border-default);
    background: #fff;
    color: var(--fg-1);
    cursor: pointer;
    transition: background-color 150ms ease-out, border-color 150ms ease-out, color 150ms ease-out;
    font-variant-numeric: tabular-nums;
  }
  .keypad button:hover { background: var(--gray-10); }
  .keypad button:active { background: var(--gray-20); }

  .keypad .op {
    background: var(--primary-10);
    border-color: var(--primary-10);
    color: var(--primary-60);
  }
  .keypad .op:hover { background: #D8E5FD; border-color: #D8E5FD; }
  .keypad .op:active { background: #A3C2F8; }

  .keypad .fn {
    background: var(--gray-10);
    color: var(--fg-2);
    font-size: 17px;
  }
  .keypad .fn:hover { background: var(--gray-20); }

  .keypad .equals {
    background: var(--primary-50);
    border-color: var(--primary-50);
    color: #fff;
    grid-row: span 2;
    height: auto;
  }
  .keypad .equals:hover { background: var(--primary-60); border-color: var(--primary-60); }
  .keypad .equals:active { background: var(--primary-70); border-color: var(--primary-70); }

  .keypad .zero { grid-column: span 2; }

  .helper {
    margin-top: 16px;
    font-size: 13px;
    color: var(--fg-3);
    text-align: center;
  }

  /* Footer */
  footer {
    background: var(--gray-100);
    color: var(--gray-50);
    font-size: 13px;
    text-align: center;
    padding: 20px 24px;
  }

  @media (max-width: 640px) {
    .header-inner { height: 56px; }
    .brand-slogan { display: none; }
    main { padding: 24px 16px 40px; }
    .calculator { padding: 16px; }
    .keypad button { height: 52px; }
  }
</style>
</head>
<body>

<div class="gov-identifier" role="region" aria-label="공식 전자정부 안내">
  이 누리집은 대한민국 공식 전자정부 누리집입니다.
</div>

<header>
  <div class="header-inner">
    <div class="brand-mark">
      <img src="krds-logo.svg" alt="정부상징">
    </div>
    <span class="brand-name">대한민국 정부 공식 계산기</span>
    <span class="brand-slogan">정확하고 빠른 계산 서비스</span>
  </div>
</header>

<main>
  <div class="calc-wrap">
    <h2 class="page-title">기본 계산기</h2>
    <p class="page-desc">사칙연산을 지원하는 계산기입니다. 키보드로도 입력할 수 있습니다.</p>

    <div class="calculator" role="application" aria-label="계산기">
      <div class="display" aria-live="polite">
        <div class="expression" id="expression">&nbsp;</div>
        <div class="result" id="result">0</div>
      </div>

      <div class="keypad">
        <button type="button" class="fn" data-action="clear" aria-label="전체 지우기">C</button>
        <button type="button" class="fn" data-action="sign" aria-label="부호 변경">+/−</button>
        <button type="button" class="fn" data-action="percent" aria-label="퍼센트">%</button>
        <button type="button" class="op" data-op="/" aria-label="나누기">÷</button>

        <button type="button" data-num="7">7</button>
        <button type="button" data-num="8">8</button>
        <button type="button" data-num="9">9</button>
        <button type="button" class="op" data-op="*" aria-label="곱하기">×</button>

        <button type="button" data-num="4">4</button>
        <button type="button" data-num="5">5</button>
        <button type="button" data-num="6">6</button>
        <button type="button" class="op" data-op="-" aria-label="빼기">−</button>

        <button type="button" data-num="1">1</button>
        <button type="button" data-num="2">2</button>
        <button type="button" data-num="3">3</button>
        <button type="button" class="op" data-op="+" aria-label="더하기">+</button>

        <button type="button" class="zero" data-num="0">0</button>
        <button type="button" data-action="dot">.</button>
        <button type="button" class="equals" data-action="equals" aria-label="계산">=</button>
      </div>

      <p class="helper">Enter 키는 계산, Esc 키는 초기화입니다.</p>
    </div>
  </div>
</main>

<footer>
  본 계산기는 KRDS 디자인 시스템의 시각 언어를 참고하여 제작되었습니다.
</footer>

<script>
(function () {
  var exprEl = document.getElementById('expression');
  var resultEl = document.getElementById('result');

  var current = '0';     // 현재 입력 중인 숫자
  var prev = null;       // 이전 피연산자
  var operator = null;   // 대기 중인 연산자
  var justEvaluated = false;

  var OP_LABEL = { '+': '+', '-': '−', '*': '×', '/': '÷' };

  function fmt(n) {
    if (!isFinite(n)) return null;
    var s = parseFloat(n.toPrecision(12)).toString();
    return s.length > 14 ? n.toExponential(6) : s;
  }

  function render() {
    resultEl.classList.remove('error');
    resultEl.textContent = current;
    exprEl.innerHTML = (prev !== null && operator)
      ? prev + ' ' + OP_LABEL[operator] + (justEvaluated ? ' ' + '…' : '')
      : '&nbsp;';
  }

  function showError() {
    resultEl.classList.add('error');
    resultEl.textContent = '계산할 수 없습니다';
    exprEl.innerHTML = '&nbsp;';
    current = '0'; prev = null; operator = null; justEvaluated = false;
  }

  function inputNum(d) {
    if (justEvaluated) { current = '0'; prev = null; operator = null; justEvaluated = false; }
    if (current === '0') current = d;
    else if (current === '-0') current = '-' + d;
    else if (current.replace(/[-.]/g, '').length < 14) current += d;
    render();
  }

  function inputDot() {
    if (justEvaluated) { current = '0'; prev = null; operator = null; justEvaluated = false; }
    if (current.indexOf('.') === -1) current += '.';
    render();
  }

  function compute(a, op, b) {
    a = parseFloat(a); b = parseFloat(b);
    switch (op) {
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b === 0 ? Infinity : a / b;
    }
  }

  function setOperator(op) {
    if (operator && !justEvaluated && prev !== null) {
      var r = compute(prev, operator, current);
      var f = fmt(r);
      if (f === null) return showError();
      prev = f; current = f;
    } else {
      prev = current;
    }
    operator = op;
    justEvaluated = false;
    current = '0';
    exprEl.textContent = prev + ' ' + OP_LABEL[op];
    resultEl.textContent = prev;
  }

  function equals() {
    if (operator === null || prev === null) return;
    var r = compute(prev, operator, current);
    var f = fmt(r);
    if (f === null) return showError();
    exprEl.textContent = prev + ' ' + OP_LABEL[operator] + ' ' + current + ' =';
    prev = null; operator = null;
    current = f;
    justEvaluated = true;
    resultEl.classList.remove('error');
    resultEl.textContent = current;
  }

  function clearAll() {
    current = '0'; prev = null; operator = null; justEvaluated = false;
    render();
  }

  function backspace() {
    if (justEvaluated) return clearAll();
    current = current.length > 1 ? current.slice(0, -1) : '0';
    if (current === '-') current = '0';
    render();
  }

  function toggleSign() {
    if (current === '0') return;
    current = current.charAt(0) === '-' ? current.slice(1) : '-' + current;
    render();
  }

  function percent() {
    var f = fmt(parseFloat(current) / 100);
    if (f === null) return showError();
    current = f;
    render();
  }

  document.querySelector('.keypad').addEventListener('click', function (e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    if (btn.dataset.num !== undefined) return inputNum(btn.dataset.num);
    if (btn.dataset.op) return setOperator(btn.dataset.op);
    switch (btn.dataset.action) {
      case 'clear': return clearAll();
      case 'sign': return toggleSign();
      case 'percent': return percent();
      case 'dot': return inputDot();
      case 'equals': return equals();
    }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key >= '0' && e.key <= '9') { inputNum(e.key); }
    else if ('+-*/'.indexOf(e.key) !== -1 && e.key.length === 1) { setOperator(e.key); }
    else if (e.key === '.') { inputDot(); }
    else if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); equals(); }
    else if (e.key === 'Escape') { clearAll(); }
    else if (e.key === 'Backspace') { backspace(); }
    else if (e.key === '%') { percent(); }
  });
})();
</script>
</body>
</html>
