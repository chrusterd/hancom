<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 컬러풀 계산기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #ff6ec4, #7873f5, #4ade80, #facc15);
    background-size: 400% 400%;
    animation: bgShift 12s ease infinite;
    padding: 20px;
  }
  @keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .app {
    width: 360px;
    background: rgba(255,255,255,.15);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,.35);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,.3);
  }

  /* 탭 */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    background: rgba(0,0,0,.15);
    border-radius: 14px;
    padding: 5px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: transparent;
    cursor: pointer;
    transition: all .25s;
  }
  .tab.active {
    background: linear-gradient(135deg, #ff6ec4, #7873f5);
    box-shadow: 0 4px 15px rgba(120,115,245,.5);
  }

  .panel { display: none; animation: fadeIn .3s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 디스플레이 */
  .display {
    background: rgba(0,0,0,.35);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    text-align: right;
  }
  .display .expression {
    min-height: 20px;
    color: rgba(255,255,255,.6);
    font-size: 14px;
    word-break: break-all;
  }
  .display .result {
    color: #fff;
    font-size: 38px;
    font-weight: 700;
    word-break: break-all;
    text-shadow: 0 0 20px rgba(255,255,255,.4);
  }

  /* 버튼 */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .buttons button {
    height: 60px;
    border: none;
    border-radius: 14px;
    font-size: 21px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    background: rgba(255,255,255,.2);
    transition: transform .08s, box-shadow .2s;
  }
  .buttons button:hover { box-shadow: 0 0 18px rgba(255,255,255,.45); }
  .buttons button:active { transform: scale(.92); }
  .op { background: linear-gradient(135deg, #7873f5, #4facfe) !important; }
  .fn { background: linear-gradient(135deg, #f97316, #facc15) !important; }
  .eq {
    background: linear-gradient(135deg, #ff6ec4, #ff2d78) !important;
    grid-column: span 2;
    box-shadow: 0 5px 20px rgba(255,45,120,.5);
  }

  /* 히스토리 */
  .history-list {
    max-height: 380px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .history-item {
    background: rgba(255,255,255,.2);
    border-radius: 12px;
    padding: 12px 14px;
    color: #fff;
    cursor: pointer;
    transition: transform .15s, background .15s;
  }
  .history-item:hover {
    background: rgba(255,255,255,.35);
    transform: translateX(4px);
  }
  .history-item .h-expr { font-size: 13px; opacity: .75; }
  .history-item .h-result { font-size: 20px; font-weight: 700; }
  .history-empty {
    text-align: center;
    color: rgba(255,255,255,.75);
    padding: 40px 0;
    font-size: 15px;
  }
  .clear-history {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #f97316, #ef4444);
    cursor: pointer;
    transition: transform .1s;
  }
  .clear-history:active { transform: scale(.97); }
</style>
</head>
<body>
  <div class="app">
    <div class="tabs">
      <button class="tab active" data-panel="calc">🧮 계산기</button>
      <button class="tab" data-panel="history">📜 기록</button>
    </div>

    <!-- 계산기 패널 -->
    <div class="panel active" id="panel-calc">
      <div class="display">
        <div class="expression" id="expression">&nbsp;</div>
        <div class="result" id="result">0</div>
      </div>
      <div class="buttons">
        <button class="fn" data-action="clear">C</button>
        <button class="fn" data-action="back">⌫</button>
        <button class="fn" data-action="percent">%</button>
        <button class="op" data-value="/">÷</button>
        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="op" data-value="*">×</button>
        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="op" data-value="-">−</button>
        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="op" data-value="+">+</button>
        <button data-value="0">0</button>
        <button data-value=".">.</button>
        <button class="eq" data-action="equals">=</button>
      </div>
    </div>

    <!-- 히스토리 패널 -->
    <div class="panel" id="panel-history">
      <div class="history-list" id="historyList"></div>
      <button class="clear-history" id="clearHistory">기록 전체 삭제</button>
    </div>
  </div>

<script>
  const exprEl = document.getElementById('expression');
  const resultEl = document.getElementById('result');
  const historyListEl = document.getElementById('historyList');
  let expr = '';
  let history = JSON.parse(localStorage.getItem('calcHistory') || '[]');

  const pretty = s => s.replace(/\//g, '÷').replace(/\*/g, '×').replace(/-/g, '−');

  function render() {
    exprEl.innerHTML = expr ? pretty(expr) : '&nbsp;';
    resultEl.textContent = expr || '0';
  }

  function renderHistory() {
    if (history.length === 0) {
      historyListEl.innerHTML = '<div class="history-empty">아직 계산 기록이 없어요 ✨</div>';
      return;
    }
    historyListEl.innerHTML = history.map((h, i) =>
      `<div class="history-item" data-index="${i}">
        <div class="h-expr">${pretty(h.expr)} =</div>
        <div class="h-result">${h.result}</div>
      </div>`).join('');
  }

  function evaluate() {
    if (!expr) return;
    try {
      if (!/^[0-9+\-*/.%() ]+$/.test(expr)) throw new Error();
      const val = Function('"use strict"; return (' + expr + ')')();
      if (!isFinite(val)) throw new Error();
      const rounded = Math.round(val * 1e10) / 1e10;
      exprEl.textContent = pretty(expr) + ' =';
      resultEl.textContent = rounded;
      history.unshift({ expr, result: rounded });
      history = history.slice(0, 50); // 최대 50개 유지
      localStorage.setItem('calcHistory', JSON.stringify(history));
      renderHistory();
      expr = String(rounded);
    } catch {
      resultEl.textContent = '오류';
      expr = '';
    }
  }

  function input(v) {
    const last = expr.slice(-1);
    if ('+-*/'.includes(v)) {
      if (!expr && v !== '-') return;
      if ('+-*/'.includes(last)) expr = expr.slice(0, -1);
      expr += v;
    } else if (v === '.') {
      const lastNum = expr.split(/[+\-*/]/).pop();
      if (lastNum.includes('.')) return;
      expr += lastNum === '' ? '0.' : '.';
    } else {
      expr += v;
    }
    render();
  }

  // 계산기 버튼
  document.querySelector('.buttons').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const { value, action } = btn.dataset;
    if (value) input(value);
    else if (action === 'clear') { expr = ''; render(); }
    else if (action === 'back') { expr = expr.slice(0, -1); render(); }
    else if (action === 'percent') {
      const lastNum = expr.split(/[+\-*/]/).pop();
      if (lastNum) { expr = expr.slice(0, -lastNum.length) + (parseFloat(lastNum) / 100); render(); }
    }
    else if (action === 'equals') evaluate();
  });

  // 탭 전환
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    });
  });

  // 히스토리 클릭 → 계산기로 불러오기
  historyListEl.addEventListener('click', e => {
    const item = e.target.closest('.history-item');
    if (!item) return;
    expr = String(history[item.dataset.index].result);
    render();
    document.querySelector('.tab[data-panel="calc"]').click();
  });

  document.getElementById('clearHistory').addEventListener('click', () => {
    history = [];
    localStorage.removeItem('calcHistory');
    renderHistory();
  });

  // 키보드 입력
  document.addEventListener('keydown', e => {
    if (/^[0-9+\-*/.]$/.test(e.key)) input(e.key);
    else if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); evaluate(); }
    else if (e.key === 'Backspace') { expr = expr.slice(0, -1); render(); }
    else if (e.key === 'Escape') { expr = ''; render(); }
  });

  renderHistory();
</script>
</body>
</html>
