<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계산기 — Airbnb 스타일</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* DESIGN-airbnb.md colors */
    --primary: #ff385c;
    --primary-active: #e00b41;
    --primary-disabled: #ffd1da;
    --error: #c13515;
    --ink: #222222;
    --body: #3f3f3f;
    --muted: #6a6a6a;
    --muted-soft: #929292;
    --hairline: #dddddd;
    --hairline-soft: #ebebeb;
    --canvas: #ffffff;
    --surface-soft: #f7f7f7;
    --surface-strong: #f2f2f2;
    --on-primary: #ffffff;

    /* rounded */
    --r-sm: 8px;
    --r-md: 14px;
    --r-full: 9999px;

    /* the single shadow tier */
    --shadow: rgba(0,0,0,0.02) 0 0 0 1px, rgba(0,0,0,0.04) 0 2px 6px 0, rgba(0,0,0,0.1) 0 4px 8px 0;

    --font: 'Inter', Circular, -apple-system, system-ui, Roboto, 'Helvetica Neue', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--canvas);
    color: var(--ink);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
  }

  /* ── Top nav (80px, bottom hairline) ─────────── */
  .top-nav {
    height: 80px;
    border-bottom: 1px solid var(--hairline-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--primary);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }
  .brand svg { width: 30px; height: 30px; }

  .product-tabs {
    display: flex;
    gap: 32px;
  }
  .tab {
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.25;
    color: var(--muted);
    padding: 8px 0;
    cursor: pointer;
  }
  .tab.active {
    color: var(--ink);
    border-bottom: 2px solid var(--ink);
  }
  .new-tag {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.32px;
    text-transform: uppercase;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    color: var(--ink);
    border-radius: var(--r-full);
    padding: 2px 6px;
  }
  .nav-util {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
  }

  /* ── Main ────────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 64px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.43;
    margin-bottom: 24px;
  }

  /* ── Display: search-bar-pill style ──────────── */
  .display-pill {
    width: 100%;
    max-width: 420px;
    min-height: 64px;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--r-full);
    box-shadow: var(--shadow);
    padding: 10px 28px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-end;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .expr {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.43;
    color: var(--muted);
    min-height: 20px;
    white-space: nowrap;
  }
  .result {
    font-size: 28px;
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: -0.3px;
    color: var(--ink);
    white-space: nowrap;
  }
  .result.error { color: var(--error); font-size: 20px; }

  /* ── Keypad card ─────────────────────────────── */
  .keypad-card {
    width: 100%;
    max-width: 420px;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--r-md);
    box-shadow: var(--shadow);
    padding: 24px;
  }
  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .key {
    height: 64px;
    border: none;
    border-radius: var(--r-full);
    font-family: var(--font);
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
    background: var(--surface-soft);
    cursor: pointer;
    transition: box-shadow .15s ease, background-color .1s ease, transform .05s ease;
  }
  .key:hover { box-shadow: var(--shadow); }
  .key:active { transform: scale(0.97); }

  .key.fn { background: var(--surface-strong); font-size: 17px; }
  .key.sci { background: var(--surface-strong); font-size: 15px; height: 48px; }
  .sci-keys {
    display: none;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding-bottom: 16px;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--hairline-soft);
  }
  body.sci-mode .sci-keys { display: grid; }
  .key.op {
    background: var(--canvas);
    border: 1px solid var(--ink);
    font-size: 22px;
  }
  .key.equals {
    background: var(--primary);
    color: var(--on-primary);
    font-size: 24px;
    font-weight: 600;
  }
  .key.equals:active { background: var(--primary-active); }

  /* ── Legal band ──────────────────────────────── */
  footer {
    border-top: 1px solid var(--hairline-soft);
    padding: 20px 40px;
    font-size: 13px;
    line-height: 1.23;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ── Mobile (<744px) ─────────────────────────── */
  @media (max-width: 743px) {
    .top-nav { padding: 0 20px; }
    .nav-util { display: none; }
    .product-tabs { gap: 20px; }
    main { padding: 32px 16px 48px; }
    h1 { font-size: 22px; }
    .keypad-card { padding: 16px; }
    .key { height: 56px; }
    footer { justify-content: center; }
  }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 2c1.9 0 3.2 1 4 2.7l5.1 11.2c.6 1.3.9 2.2.9 3 0 1.9-1.5 3.4-3.4 3.4-1.6 0-2.9-.9-4.6-2.9l-2-2.4-2 2.4c-1.7 2-3 2.9-4.6 2.9C3.5 22.3 2 20.8 2 18.9c0-.8.3-1.7.9-3L8 4.7C8.8 3 10.1 2 12 2zm0 2c-1 0-1.7.5-2.2 1.6L4.7 16.7c-.5 1-.7 1.7-.7 2.2 0 .8.6 1.4 1.4 1.4.9 0 1.8-.7 3.2-2.4l2.5-3.1c-1.5-2-2.4-3.7-2.4-5.2 0-1.9 1.4-3.3 3.3-3.3s3.3 1.4 3.3 3.3c0 1.5-.9 3.2-2.4 5.2l2.5 3.1c1.4 1.7 2.3 2.4 3.2 2.4.8 0 1.4-.6 1.4-1.4 0-.5-.2-1.2-.7-2.2L14.2 5.6C13.7 4.5 13 4 12 4zm0 4.3c-.8 0-1.3.5-1.3 1.3 0 .9.6 2.1 1.3 3.1.7-1 1.3-2.2 1.3-3.1 0-.8-.5-1.3-1.3-1.3z"/>
    </svg>
    계산기
  </div>
  <div class="product-tabs">
    <div class="tab active" id="tab-basic">기본</div>
    <div class="tab" id="tab-sci">공학 <span class="new-tag">NEW</span></div>
  </div>
  <div class="nav-util">키보드 입력 지원</div>
</nav>

<main>
  <h1>오늘은 무엇을 계산할까요?</h1>

  <div class="display-pill" aria-live="polite">
    <div class="expr" id="expr">&nbsp;</div>
    <div class="result" id="result">0</div>
  </div>

  <div class="keypad-card">
    <div class="sci-keys">
      <button class="key sci" data-fn="sin">sin</button>
      <button class="key sci" data-fn="cos">cos</button>
      <button class="key sci" data-fn="tan">tan</button>
      <button class="key sci" data-op="^">xʸ</button>

      <button class="key sci" data-fn="ln">ln</button>
      <button class="key sci" data-fn="log">log</button>
      <button class="key sci" data-fn="sqrt">√</button>
      <button class="key sci" data-fn="sqr">x²</button>

      <button class="key sci" data-fn="inv">1/x</button>
      <button class="key sci" data-fn="fact">n!</button>
      <button class="key sci" data-const="pi">π</button>
      <button class="key sci" data-const="e">e</button>
    </div>
    <div class="keys">
      <button class="key fn" data-action="clear">C</button>
      <button class="key fn" data-action="sign">±</button>
      <button class="key fn" data-action="percent">%</button>
      <button class="key op" data-op="÷">÷</button>

      <button class="key" data-digit="7">7</button>
      <button class="key" data-digit="8">8</button>
      <button class="key" data-digit="9">9</button>
      <button class="key op" data-op="×">×</button>

      <button class="key" data-digit="4">4</button>
      <button class="key" data-digit="5">5</button>
      <button class="key" data-digit="6">6</button>
      <button class="key op" data-op="−">−</button>

      <button class="key" data-digit="1">1</button>
      <button class="key" data-digit="2">2</button>
      <button class="key" data-digit="3">3</button>
      <button class="key op" data-op="+">+</button>

      <button class="key fn" data-action="backspace">⌫</button>
      <button class="key" data-digit="0">0</button>
      <button class="key" data-digit=".">.</button>
      <button class="key equals" data-action="equals">=</button>
    </div>
  </div>
</main>

<footer>
  <span>© 2026 계산기, Inc. · 개인정보 처리방침 · 이용약관</span>
  <span>한국어 (KR) · ₩ KRW</span>
</footer>

<script>
  const exprEl = document.getElementById('expr');
  const resultEl = document.getElementById('result');

  // 상태 기반 계산 (eval 미사용)
  let current = '0';     // 입력 중인 값 (문자열)
  let stored = null;     // 누적 값 (숫자)
  let operator = null;   // 대기 중인 연산자
  let justEvaluated = false;
  let errored = false;
  let errorMsg = '';

  function compute(a, op, b) {
    switch (op) {
      case '+': return a + b;
      case '−': return a - b;
      case '×': return a * b;
      case '÷': return b === 0 ? null : a / b;
      case '^': return Math.pow(a, b);
    }
  }

  function factorial(n) {
    if (n < 0 || !Number.isInteger(n) || n > 170) return NaN;
    let r = 1;
    for (let i = 2; i <= n; i++) r *= i;
    return r;
  }

  const unary = {
    sin:  x => Math.sin(x * Math.PI / 180),
    cos:  x => Math.cos(x * Math.PI / 180),
    tan:  x => Math.tan(x * Math.PI / 180),
    ln:   x => Math.log(x),
    log:  x => Math.log10(x),
    sqrt: x => Math.sqrt(x),
    sqr:  x => x * x,
    inv:  x => x === 0 ? NaN : 1 / x,
    fact: factorial,
  };
  const fnLabel = { sin:'sin', cos:'cos', tan:'tan', ln:'ln', log:'log', sqrt:'√', sqr:'sqr', inv:'1/', fact:'fact' };

  function format(n) {
    if (n === null || !isFinite(n)) return null;
    // 부동소수점 오차 정리 후 최대 12자리
    const s = parseFloat(n.toPrecision(12)).toString();
    return s;
  }

  function render(exprText) {
    exprEl.innerHTML = exprText || '&nbsp;';
    resultEl.classList.toggle('error', errored);
    resultEl.textContent = errored ? errorMsg : current;
  }

  function setError(msg, exprText) {
    errored = true;
    errorMsg = msg;
    operator = null;
    render(exprText || '');
  }

  function clearAll() {
    current = '0';
    stored = null;
    operator = null;
    justEvaluated = false;
    errored = false;
    render('');
  }

  function inputDigit(d) {
    if (errored) clearAll();
    if (justEvaluated) { current = '0'; justEvaluated = false; exprEl.innerHTML = '&nbsp;'; }
    if (d === '.') {
      if (current.includes('.')) return;
      current += '.';
    } else {
      current = current === '0' ? d : current + d;
    }
    render(operator ? `${format(stored)} ${operator}` : '');
  }

  function inputOperator(op) {
    if (errored) return;
    if (operator !== null && !justEvaluated) {
      const r = compute(stored, operator, parseFloat(current));
      if (r === null) { setError('0으로 나눌 수 없어요'); return; }
      if (!isFinite(r)) { setError('계산할 수 없어요'); return; }
      stored = r;
    } else {
      stored = parseFloat(current);
    }
    operator = op;
    current = '0';
    justEvaluated = false;
    render(`${format(stored)} ${op}`);
    resultEl.textContent = format(stored);
  }

  function equals() {
    if (errored || operator === null) return;
    const b = parseFloat(current);
    const exprText = `${format(stored)} ${operator} ${format(b)} =`;
    const r = compute(stored, operator, b);
    if (r === null) { setError('0으로 나눌 수 없어요', exprText); return; }
    if (!isFinite(r)) { setError('계산할 수 없어요', exprText); return; }
    current = format(r);
    stored = null;
    operator = null;
    justEvaluated = true;
    render(exprText);
  }

  function backspace() {
    if (errored) { clearAll(); return; }
    if (justEvaluated) return;
    current = current.length > 1 ? current.slice(0, -1) : '0';
    render(operator ? `${format(stored)} ${operator}` : '');
  }

  function toggleSign() {
    if (errored) return;
    current = current.startsWith('-') ? current.slice(1) : (current === '0' ? '0' : '-' + current);
    render(operator ? `${format(stored)} ${operator}` : '');
  }

  function percent() {
    if (errored) return;
    current = format(parseFloat(current) / 100);
    render(operator ? `${format(stored)} ${operator}` : '');
  }

  function applyUnary(fn) {
    if (errored) return;
    const x = parseFloat(current);
    const r = unary[fn](x);
    const exprText = `${fnLabel[fn]}(${format(x)})`;
    if (r === null || isNaN(r) || !isFinite(r)) { setError('계산할 수 없어요', exprText); return; }
    current = format(r);
    justEvaluated = operator === null;
    render(operator ? `${format(stored)} ${operator}` : exprText);
  }

  function insertConst(name) {
    if (errored) clearAll();
    if (justEvaluated) { justEvaluated = false; exprEl.innerHTML = '&nbsp;'; }
    current = format(name === 'pi' ? Math.PI : Math.E);
    render(operator ? `${format(stored)} ${operator}` : '');
  }

  document.querySelectorAll('.key').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.digit !== undefined) inputDigit(btn.dataset.digit);
      else if (btn.dataset.op) inputOperator(btn.dataset.op);
      else if (btn.dataset.fn) applyUnary(btn.dataset.fn);
      else if (btn.dataset.const) insertConst(btn.dataset.const);
      else switch (btn.dataset.action) {
        case 'clear': clearAll(); break;
        case 'equals': equals(); break;
        case 'backspace': backspace(); break;
        case 'sign': toggleSign(); break;
        case 'percent': percent(); break;
      }
    });
  });

  // 탭 전환: 기본 ↔ 공학
  const tabBasic = document.getElementById('tab-basic');
  const tabSci = document.getElementById('tab-sci');
  tabBasic.addEventListener('click', () => {
    document.body.classList.remove('sci-mode');
    tabBasic.classList.add('active');
    tabSci.classList.remove('active');
  });
  tabSci.addEventListener('click', () => {
    document.body.classList.add('sci-mode');
    tabSci.classList.add('active');
    tabBasic.classList.remove('active');
  });

  const opMap = { '+': '+', '-': '−', '*': '×', '/': '÷', '^': '^' };
  window.addEventListener('keydown', e => {
    if (/^[0-9.]$/.test(e.key)) inputDigit(e.key);
    else if (opMap[e.key]) inputOperator(opMap[e.key]);
    else if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); equals(); }
    else if (e.key === 'Backspace') backspace();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === '%') percent();
  });
</script>
</body>
</html>
