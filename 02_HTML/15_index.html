<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
<head>                    <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
  <title>입력 폼</title>     <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
  <!-- form = 입력칸들을 담는 묶음 상자 -->
  <form>                                  <!-- form = 입력칸 묶음 상자 -->
    <label>이름: <input type="text" placeholder="이름 입력"></label>   <!-- label=설명 글자 / input=글자 칸 -->
    <br>
    <label>나이: <input type="number"></label>   <!-- input type=number → 숫자 칸 -->
    <br>
    <button type="submit">보내기</button>   <!-- 누르는 버튼 -->
  </form>
</body>
</html>
