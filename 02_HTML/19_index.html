<!DOCTYPE html>             <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">            <!-- 문서 시작, 한국어 페이지 -->
<head>                      <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">    <!-- 한글 안 깨지게 -->
  <title>id 이름표</title>     <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                      <!-- 화면에 보이는 진짜 내용 칸 -->
  <!-- id = 페이지에 딱 하나뿐인 이름표 (같은 값 두 번 X, 학번처럼) -->
  <h1 id="top">맨 위 제목</h1>
  <p id="content">아래 내용</p>
</body>
</html>
