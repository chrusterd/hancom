<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
<head>                    <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
  <title>입력칸 종류</title>  <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
  <label>                                          <!-- 입력칸들을 담는 묶음 상자 -->
    <input type="email" placeholder="메일주소"><br>     <!-- 메일 칸 (@ 들어갔는지 검사) -->
    <input type="password" placeholder="비밀번호"><br>              <!-- 점(••)으로 가려지는 칸 -->
    <label>해당사항 모두 체크<input type="checkbox"> 동의</label><input type="checkbox"> 저장하기</label><br>  <!-- 여러 개 고르기(네모) -->
    <label>성별<input type="radio" name="gender"> 남 <input type="radio" name="gender"> 여</label><br>  <!-- 하나만 고르기(동그라미), name 같으면 한 묶음 -->
    <label>예약일<input type="date"></label><br>                  <!-- 날짜 고르기(달력) -->
    <textarea>남기실 말을 입력하세요</textarea><br>   <!-- 여러 줄 긴 글 칸 -->
    지역
    <select>                              <!-- 펼쳐서 하나 고르기(드롭다운) -->
      <option>서울</option>                       <!-- 고를 항목 1 -->
      <option>부산</option>                       <!-- 고를 항목 2 -->
    </select>
    <hr>
    <label><input type="submit"></label>
  </form>
</body>
</html>
