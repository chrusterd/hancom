<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
<head>                    <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
  <title>시간표</title>      <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
  <!-- table = 표 전체 상자, border="1"은 칸 선을 보이게 함 -->
  <table border="1">
    <tr><th>요일</th><th>과목</th></tr>   <!-- tr=가로 한 줄, th=제목 칸(굵게 가운데) -->
    <tr><td>월</td><td>국어</td></tr>     <!-- td=보통 내용 칸 -->
    <tr><td>화</td><td>수학</td></tr>
  </table>
</body>
</html>
