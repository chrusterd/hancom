<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
<head>                    <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
  <title>접는 상자</title>    <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
  <details>                          <!-- 클릭하면 펴고 접히는 상자 -->
    <summary>정답 보기</summary>     <!-- 항상 보이는 제목(클릭 버튼) -->
    <p>여기는 눌러야 보여</p>             <!-- 펼쳐야 보이는 내용 -->
  </details>
</body>
</html>
