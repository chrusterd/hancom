<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
<head>                    <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
  <title>번호 목록</title>    <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
  <!-- ol = 번호(1·2·3)가 자동으로 붙는 목록, 순서 중요할 때 -->
  <ol>
    <li>일어나기</li>    <!-- 1번 항목 -->
    <li>세수하기</li>    <!-- 2번 항목 -->
    <li>아침 먹기</li>   <!-- 3번 항목 -->
  </ol>
</body>
</html>
