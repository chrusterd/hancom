<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
<head>                    <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
  <title>링크 더 쓰기</title>  <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
  <a href="https://google.com" target="_blank">새 탭</a>   <!-- 새 탭에서 열기 -->
  <a href="#top">맨 위로</a>                    <!-- 같은 페이지 id="top"로 점프 (STEP 19) -->
  <a href="mailto:hi@me.com">메일</a>          <!-- 누르면 메일 쓰기 창 -->
  <a href="tel:01012345678">전화</a>          <!-- 폰에서 누르면 전화 걸기 -->
</body>
</html>
