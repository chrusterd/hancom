<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
<head>                    <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
  <title>이미지 경로</title>   <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
  <h1>이미지 경로</h1>
  <!-- src 경로 = 사진이 어느 폴더에 있는지 길 안내 -->
  <img src="../img/dog.webp" height="300" alt="dog">   <!-- ./ = 지금 폴더 안 img 폴더 -->
  <img src="https://picsum.photos/320/300" alt="로고">       <!-- ../ = 한 칸 위 폴더 -->
  <img src="https://picsum.photos/300" alt="인터넷 사진">   <!-- https:// = 인터넷 주소 그대로(절대경로) -->
</body>
</html>
