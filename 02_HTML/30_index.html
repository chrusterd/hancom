<!DOCTYPE html>           <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">          <!-- 문서 시작, 한국어 페이지 -->
<head>                    <!-- 화면엔 안 보이는 준비 칸 -->
  <meta charset="UTF-8">  <!-- 한글 안 깨지게 -->
  <title>음성 넣기</title>    <!-- 브라우저 탭에 뜨는 이름 -->
</head>
<body>                    <!-- 화면에 보이는 진짜 내용 칸 -->
  <audio controls>                       <!-- 음성 재생 상자(재생 버튼) -->
    <source src="song.mp3" type="audio/mpeg">  <!-- mp3 후보 -->
    <source src="song.ogg" type="audio/ogg">   <!-- ogg 후보(둘 중 가능한 것 재생) -->
    내 브라우저는 audio 미지원      <!-- 둘 다 안 되면 보일 글 -->
  </audio>
</body>
</html>
