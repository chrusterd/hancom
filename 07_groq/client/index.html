<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 채팅</title>
<link rel="stylesheet" href="style.css">
<!-- 마크다운 → HTML 변환 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>무엇을 도와드릴까요?</h1>
      <p class="subtitle">Groq · llama-3.1-8b-instant</p>
    </header>

    <!-- 대화 내용이 쌓이는 곳 -->
    <main id="chat"></main>

    <!-- 질문 입력 영역 -->
    <footer class="input-area">
      <div class="input-box">
        <input id="q" placeholder="메시지를 입력하세요..." autocomplete="off" />
        <button id="btn" title="보내기">↑</button>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
