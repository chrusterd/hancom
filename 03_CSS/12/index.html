<!-- index.html : position 연습 -->
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요소 위치 잡기 — position</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <h1>position</h1>
    <!-- 부모에 relative → 안쪽 absolute가 이 부모 기준 -->
    <div class="parent">
      <span class="ptag">부모 (relative)</span>
      <div class="rel">relative</div>
      <div class="abs">absolute</div>
    </div>
    <div class="fixed">fixed</div>
    <div class="sticky">sticky</div>
    <p>일반 글은 원래 흐름대로 흐름</p>
    <p>아래로 스크롤하면 fixed는 그대로 있음</p>
    <p>sticky는 위에 붙음</p>
  </body>
</html>
